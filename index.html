<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografie Portfolio</title>
    <style>
        /* Grunddesign (Schrift & Farben) */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            background-color: #ffffff;
            color: #000000;
        }

        /* Header-Bereich mit Profilbild und Text */
        header {
            padding: 80px 20px 40px 20px;
            text-align: center;
        }

        .profile-pic {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .bio {
            max-width: 550px;
            margin: 0 auto;
            font-size: 15px;
            line-height: 1.7;
            color: #555;
        }

        /* Das Masonry-Gitter (Spalten-Layout) */
        .masonry-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            /* Automatische Spaltenanzahl */
            column-count: 3; 
            column-gap: 20px;
        }

        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid; /* Wichtig: Bild wird nicht zerteilt */
        }

        .masonry-item img {
            width: 100%;
            display: block;
            height: auto;
            border-radius: 2px; /* Ganz leicht abgerundet für modernen Look */
            transition: opacity 0.3s ease;
        }

        .masonry-item img:hover {
            opacity: 0.85;
        }

        /* Anpassung für kleinere Bildschirme */
        @media (max-width: 900px) {
            .masonry-container { column-count: 2; }
        }

        @media (max-width: 600px) {
            .masonry-container { column-count: 1; }
            header { padding: 50px 20px; }
        }
    </style>
</head>
<body>

<header>
    <img src="profil.jpg" alt="Profilbild" class="profile-pic">
    
    <h1>OVERVIEW</h1>
    
    <p class="bio">
        Hi, ich bin David, ein Hobbyfotograf mit Leidenschaft für Tiere, die Natur, Landschaften und Reiseabenteuer.
    </p>
</header>

<div class="masonry-container" id="gallery">
    </div>

<script>
    const gallery = document.getElementById('gallery');
    const maxBilder = 50; 
    const dateiEndung = ".jpg"; 

    for (let i = 1; i <= maxBilder; i++) {
        let imgContainer = document.createElement('div');
        imgContainer.className = 'masonry-item';
        
        let img = new Image();
        img.src = 'foto' + i + dateiEndung;
        img.alt = 'Portfolio Bild ' + i;

        img.onload = function() {
            imgContainer.appendChild(img);
            gallery.appendChild(imgContainer);
        };


        img.onerror = function() {

        };
    }
</script>

</body>
</html>
