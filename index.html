<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Portfolio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #fff; color: #000; text-align: center; }
        
        /* Navigation */
        header { padding: 60px 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
        nav { margin-bottom: 30px; }
        nav a { text-decoration: none; color: #000; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; margin: 0 15px; cursor: pointer; }
        nav a:hover { opacity: 0.6; }
        .bio { max-width: 550px; margin: 0 auto; font-size: 15px; line-height: 1.6; color: #666; margin-bottom: 40px; }

        /* Sektionen */
        #contact-section { display: none; padding: 40px 20px; }

        /* Masonry Gitter */
        .masonry-container { padding: 15px; max-width: 1200px; margin: 0 auto; column-count: 3; column-gap: 15px; }
        .masonry-item { display: inline-block; width: 100%; margin-bottom: 15px; break-inside: avoid; cursor: pointer; }
        .masonry-item img { width: 100%; display: block; height: auto; transition: transform 0.3s ease; }
        .masonry-item img:hover { transform: scale(1.02); }

        /* Instagram Button Style */
        .insta-btn {
            text-decoration: none; 
            color: #000; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            border: 1px solid #000; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .insta-btn:hover {
            background-color: #000;
            color: #fff;
        }

        /* LIGHTBOX STYLING */
        #lightbox {
            position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255,255,255,0.95);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.4s ease-in-out;
            cursor: zoom-out;
        }
        #lightbox.active { opacity: 1; visibility: visible; }
        #lightbox img { 
            max-width: 90%; max-height: 90%; 
            transform: scale(0.8); transition: transform 0.4s ease-in-out; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #lightbox.active img { transform: scale(1); }

        @media (max-width: 800px) { .masonry-container { column-count: 2; } }
        @media (max-width: 500px) { .masonry-container { column-count: 1; } }
    </style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Zoom">
</div>

<header>
    <img src="profil.jpg" alt="Profil" class="profile-pic">
    
    <nav>
        <a onclick="showSection('gallery-section')">Overview</a>
        <a onclick="showSection('contact-section')">Contact</a>
    </nav>

    <div id="gallery-section">
        <p class="bio">Hi, ich bin David, ein Hobbyfotograf mit Leidenschaft für Tiere, die Natur und Reiseabenteuer.</p>
        <div class="masonry-container" id="gallery"></div>
    </div>

    <div id="contact-section">
        <h1>Kontakt</h1>
        <p class="bio">Lass uns vernetzen! Du findest mich am besten auf Instagram für tägliche Updates und neue Schnappschüsse.</p>
        
        <a href="https://www.instagram.com/dpv0112/" target="_blank" class="insta-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.917 3.917 0 0 0-1.417.923A3.927 3.927 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.916 3.916 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.926 3.926 0 0 0-.923-1.417A3.911 3.911 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0h.003zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599.28.28.453.546.598.92.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.47 2.47 0 0 1-.599.919c-.28.28-.546.453-.92.598-.282.11-.705.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.478 2.478 0 0 1-.92-.598 2.48 2.48 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233 0-2.136.008-2.388.046-3.231.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92.28-.28.546-.453.92-.598.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045v.002zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92zm-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217zm0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334z"/>
            </svg>
            @dpv0112 auf Instagram
        </a>

        <div style="margin-top: 50px; color: #999; font-size: 13px;">
            <p>E-Mail: <strong style="color: #000;">dpv01@proton.me</strong></p>
        </div>
    </div>
</header>

<script>
    function showSection(id) {
        document.getElementById('gallery-section').style.display = 'none';
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    const gallery = document.getElementById('gallery');
    const maxBilder = 50; 

    for (let i = maxBilder; i >= 1; i--) {
        let img = new Image();
        img.src = 'foto' + i + '.jpg';
        
        img.onload = function() {
            let div = document.createElement('div');
            div.className = 'masonry-item';
            div.onclick = function() { openLightbox(this.firstChild.src); };
            div.appendChild(img);
            gallery.appendChild(div);
        };
    }
</script>

</body>
</html>
