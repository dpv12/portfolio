<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Portfolio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: #fff; color: #000; text-align: center; }
        
        /* Navigation / Header */
        header { padding: 60px 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; }
        
        nav { margin-bottom: 30px; }
        nav a { 
            text-decoration: none; 
            color: #000; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: bold;
            margin: 0 15px;
            cursor: pointer;
        }
        nav a:hover { opacity: 0.6; }

        .bio { max-width: 550px; margin: 0 auto; font-size: 15px; line-height: 1.6; color: #666; margin-bottom: 40px; }

        /* Kontakt-Bereich (Standardmäßig versteckt) */
        #contact-section { display: none; padding: 40px 20px; }

        /* Masonry Gitter */
        .masonry-container {
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
            column-count: 3;
            column-gap: 15px;
        }
        .masonry-item { display: inline-block; width: 100%; margin-bottom: 15px; break-inside: avoid; }
        .masonry-item img { width: 100%; display: block; height: auto; transition: transform 0.3s; }
        .masonry-item img:hover { transform: scale(1.02); }

        @media (max-width: 800px) { .masonry-container { column-count: 2; } }
        @media (max-width: 500px) { .masonry-container { column-count: 1; } }
    </style>
</head>
<body>

<header>
    <img src="profil.jpg" alt="Profil" class="profile-pic">
    
    <nav>
        <a onclick="showSection('gallery-section')">Overview</a>
        <a onclick="showSection('contact-section')">Contact</a>
    </nav>

    <div id="gallery-section">
        <p class="bio">Hi, ich bin David, ein Hobbyfotograf mit Leidenschaft für Tiere, die Natur, Landschaften und Reiseabenteuer.</p>
        <div class="masonry-container" id="gallery"></div>
    </div>

    <div id="contact-section">
        <h1>Kontakt</h1>
        <p>Du hast Fragen oder möchtest zusammenarbeiten?</p>
        <p>E-Mail: <strong>deine-email@beispiel.de</strong></p>
        <p>Instagram: @deinname</p>
    </div>
</header>

<script>
    // Funktion zum Wechseln der Seiten
    function showSection(id) {
        document.getElementById('gallery-section').style.display = 'none';
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    // Automatisches Laden der Bilder (Neueste zuerst)
    const gallery = document.getElementById('gallery');
    const maxBilder = 50; 
    const dateiEndung = ".jpg"; 

    // Wir zählen RÜCKWÄRTS (von 50 nach 1)
    for (let i = maxBilder; i >= 1; i--) {
        let img = new Image();
        img.src = 'foto' + i + dateiEndung;
        
        img.onload = function() {
            let div = document.createElement('div');
            div.className = 'masonry-item';
            div.appendChild(img);
            gallery.appendChild(div);
        };
    }
</script>

</body>
</html>
