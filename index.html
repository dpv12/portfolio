<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Portfolio</title>
    <style>
        /* Dunkles Design & Grain Effekt */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_600x600.png');
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }
        
        header { padding: 60px 20px 20px 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 1px solid #333; }
        
        nav { margin-bottom: 30px; }
        nav a { 
            text-decoration: none; color: #fff; font-size: 14px; letter-spacing: 2px; 
            text-transform: uppercase; font-weight: bold; margin: 0 15px; cursor: pointer; opacity: 0.8;
        }
        nav a:hover { opacity: 1; border-bottom: 1px solid #fff; }

        .bio { max-width: 550px; margin: 0 auto; font-size: 15px; line-height: 1.6; color: #aaa; margin-bottom: 40px; padding: 0 20px; }

        #contact-section, #trips-section { display: none; padding: 40px 20px; }

        /* TRIPS BLOG STYLING */
        .trip-post { max-width: 800px; margin: 0 auto 80px auto; text-align: left; padding: 0 20px; }
        .trip-post img { width: 100%; border-radius: 4px; margin-bottom: 20px; cursor: pointer; transition: opacity 0.3s ease; }
        .trip-post img:hover { opacity: 0.9; }
        .trip-post h2 { font-size: 24px; margin-bottom: 10px; color: #fff; letter-spacing: 1px; }
        .trip-post .date { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .trip-post p { font-size: 16px; line-height: 1.8; color: #ccc; }

        /* MASONRY GITTER (Overview) */
        .masonry-container { 
            width: 100%;
            padding: 0 4%; 
            box-sizing: border-box;
            max-width: 1600px; 
            margin: 0 auto; 
            column-count: 3; 
            column-gap: 20px; 
        }

        .masonry-item { 
            display: inline-block; 
            width: 100%; 
            margin-bottom: 20px; 
            break-inside: avoid; 
            cursor: pointer; 
            border-radius: 4px; 
            overflow: hidden; 
            background: #222; 
        }
        .masonry-item img { width: 100%; display: block; transition: transform 0.4s ease; }
        .masonry-item img:hover { transform: scale(1.05); }

        /* Buttons & Socials */
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 30px; }
        .social-btn {
            text-decoration: none; color: #fff; display: inline-flex; align-items: center; gap: 10px; 
            border: 1px solid #444; padding: 12px 25px; border-radius: 50px; font-weight: bold; 
            transition: all 0.3s ease; width: 220px; justify-content: center; background: rgba(255,255,255,0.05);
        }
        .social-btn:hover { background-color: #fff; color: #000; }

        /* LIGHTBOX */
        #lightbox {
            position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease-in-out; cursor: zoom-out; touch-action: none;
        }
        #lightbox.active { opacity: 1; visibility: visible; }
        #lightbox img { 
            max-width: 90%; max-height: 90%; 
            transform: scale(1) translate(0px, 0px); 
            transition: transform 0.3s ease, opacity 0.2s ease; 
            user-select: none; transform-origin: center center;
        }
        #lightbox.active img { transform: scale(1); }
        /* Blockiert Animationen während dem Finger-Ziehen für Echtzeit-Reaktion */
        #lightbox img.no-transition { transition: opacity 0.2s ease; }

        @media (max-width: 1100px) { .masonry-container { column-count: 3; padding: 20px 4%; } }
        @media (max-width: 850px) { .masonry-container { column-count: 2; padding: 20px 5%; } }
        @media (max-width: 550px) { .masonry-container { column-count: 1; padding: 10px 15px; } header { padding: 40px 10px; } }
    </style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Zoom" onclick="event.stopPropagation()">
</div>

<header>
    <img src="profil.jpg" alt="Profil" class="profile-pic">
    
    <nav>
        <a id="nav-overview" onclick="showSection('gallery-section')">Overview</a>
        <a id="nav-contact" onclick="showSection('contact-section')">Contact</a>
    </nav>

    <div id="gallery-section">
        <p id="bio-text" class="bio">Hi, ich bin David, ein Hobbyfotograf mit Leidenschaft für Tiere, die Natur und Reiseabenteuer.</p>
        <div class="masonry-container" id="gallery"></div>
    </div>

    <div id="contact-section">
        <h1 id="contact-title">Kontakt</h1>
        <div class="btn-container">
            <a href="https://www.instagram.com/dpv0112/" target="_blank" class="social-btn">Instagram</a>
            <a href="https://www.linkedin.com/in/david-vorwerk-b04119305" target="_blank" class="social-btn">LinkedIn</a>
        </div>
        <div style="margin-top: 60px; opacity: 0.4; font-size: 12px; letter-spacing: 1px;">
            <p>E-Mail: <strong style="color: #aaa;">dpv01@proton.me</strong></p>
            <p style="text-transform: uppercase; margin-top: 20px;">&copy; 2026 David Vorwerk</p>
            <p id="rights-text" style="font-style: italic; font-size: 10px; margin-top: 5px;">All rights reserved. Images may not be used without permission.</p>
        </div>
    </div>
</header>

<script>
    try {
        const userLang = navigator.language || navigator.userLanguage || "en";
        if (!userLang.startsWith('de')) {
            document.getElementById('nav-overview').innerText = 'Overview';
            document.getElementById('nav-contact').innerText = 'Contact';
            document.getElementById('bio-text').innerText = "Hi, I'm David, a hobby photographer with a passion for animals, nature and travel adventures.";
            document.getElementById('contact-title').innerText = 'Contact';
            document.getElementById('rights-text').innerText = 'All rights reserved. Images may not be used without permission.';
        }
    } catch(e) {}

    function showSection(id) {
        document.getElementById('gallery-section').style.display = 'none';
        if(document.getElementById('trips-section')) document.getElementById('trips-section').style.display = 'none';
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentImages = [];
    let currentIndex = 0;
    
    // Zoom & Pan Variablen
    let isZooming = false;
    let isPanning = false;
    let currentScale = 1;
    let startDistance = 0;
    let startScale = 1;
    let panX = 0, panY = 0;
    let lastTouchX = 0, lastTouchY = 0;
    let touchStartX = 0;

    function openLightbox(src) {
        currentIndex = currentImages.indexOf(src);
        if(currentIndex === -1) currentIndex = 0; 
        lightboxImg.src = currentImages[currentIndex];
        lightbox.classList.add('active');
        resetZoom();
    }

    function openLightboxManual(src) {
        lightboxImg.src = src;
        lightbox.classList.add('active');
        currentImages = [src];
        currentIndex = 0;
        resetZoom();
    }

    function closeLightbox() { 
        lightbox.classList.remove('active'); 
        resetZoom(); 
    }

    function applyTransform() {
        lightboxImg.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
    }

    function resetZoom() {
        currentScale = 1; panX = 0; panY = 0;
        isZooming = false; isPanning = false;
        lightboxImg.classList.remove('no-transition');
        applyTransform();
    }

    function updateLightboxImage() {
        lightboxImg.style.opacity = '0'; resetZoom();
        setTimeout(() => { lightboxImg.src = currentImages[currentIndex]; lightboxImg.style.opacity = '1'; }, 150);
    }

    function nextImage() { if(currentImages.length > 1) { currentIndex = (currentIndex + 1) % currentImages.length; updateLightboxImage(); } }
    function prevImage() { if(currentImages.length > 1) { currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; updateLightboxImage(); } }

    // PROFESIONELLE SWIPE, ZOOM & PAN LOGIK
    lightbox.addEventListener('touchstart', e => { 
        if (e.touches.length === 2) {
            isZooming = true;
            isPanning = false;
            lightboxImg.classList.add('no-transition');
            startDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            startScale = currentScale;
        } else if (e.touches.length === 1) {
            if (currentScale > 1) {
                // Ein Finger, aber Bild ist herangezoomt -> Panning Modus
                isPanning = true;
                lightboxImg.classList.add('no-transition');
                lastTouchX = e.touches[0].pageX;
                lastTouchY = e.touches[0].pageY;
            } else {
                // Normales Wischen vorbereiten
                touchStartX = e.touches[0].screenX; 
            }
        }
    }, {passive: false});

    lightbox.addEventListener('touchmove', function(e) {
        if (isZooming && e.touches.length === 2) {
            e.preventDefault(); 
            let currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            currentScale = startScale * (currentDistance / startDistance);
            if (currentScale < 1) currentScale = 1; 
            if (currentScale > 5) currentScale = 5; // Maximaler Zoom x5
            applyTransform();
        } else if (isPanning && e.touches.length === 1) {
            e.preventDefault();
            // Berechne die Fingerbewegung
            let deltaX = e.touches[0].pageX - lastTouchX;
            let deltaY = e.touches[0].pageY - lastTouchY;
            panX += deltaX;
            panY += deltaY;
            lastTouchX = e.touches[0].pageX;
            lastTouchY = e.touches[0].pageY;
            applyTransform();
        }
    }, {passive: false});

    lightbox.addEventListener('touchend', e => { 
        if (e.touches.length === 1 && isZooming) {
            // Übergang von 2 auf 1 Finger: Zoom stoppt, Panning startet nahtlos
            isZooming = false;
            if (currentScale > 1) {
                isPanning = true;
                lastTouchX = e.touches[0].pageX;
                lastTouchY = e.touches[0].pageY;
            }
            return;
        }

        if (e.touches.length === 0) {
            isZooming = false;
            isPanning = false;
            if (currentScale <= 1) {
                resetZoom();
            } else {
                // Bild bleibt gezoomt und gepannt stehen, aber weiche Animation wird wieder aktiviert
                lightboxImg.classList.remove('no-transition');
            }
        }

        if (currentScale === 1 && !isZooming && !isPanning && e.changedTouches.length === 1) {
            // Normales Blättern
            let touchEndX = e.changedTouches[0].screenX; 
            if (touchEndX < touchStartX - 40) nextImage();
            if (touchEndX > touchStartX + 40) prevImage();
        }
    }, {passive: false});

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
    });

    const gallery = document.getElementById('gallery');
    const maxBilder = 30; 

    for (let i = maxBilder; i >= 1; i--) { tryLoad(i, 0); }

    function tryLoad(id, extIndex) {
        const exts = ['.jpg', '.JPG'];
        if (extIndex >= exts.length) return;
        let img = new Image();
        img.src = 'foto' + id + exts[extIndex];
        img.loading = "lazy";
        img.onload = function() {
            currentImages.push(img.src);
            let div = document.createElement('div');
            div.className = 'masonry-item';
            div.onclick = (e) => { e.stopPropagation(); openLightbox(img.src); };
            div.appendChild(img);
            gallery.appendChild(div);
        };
        img.onerror = () => tryLoad(id, extIndex + 1);
    }
</script>

</body>
</html>
