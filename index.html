<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Portfolio</title>
    <style>
        /* Dunkles Design & Grain Effekt */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: #1a1a1a; 
            color: #e0e0e0; 
            text-align: center;
            position: relative;
            overflow-x: hidden;
            
            /* Kopierschutz: Verhindert das Markieren von Text und Elementen */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Verhindert das Scrollen im Hintergrund, wenn die Lightbox offen ist */
        body.no-scroll {
            overflow: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/Noise_600x600.png');
            opacity: 0.04; pointer-events: none; z-index: 9999;
        }
        
        header { padding: 60px 20px 20px 20px; }
        
        .profile-pic { 
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 1px solid #333; 
            /* KOPIERSCHUTZ PROFILBILD */
            pointer-events: none; 
            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }
        
        nav { margin-bottom: 30px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        nav a { 
            text-decoration: none; color: #fff; font-size: 14px; letter-spacing: 2px; 
            text-transform: uppercase; font-weight: bold; margin: 0 15px; cursor: pointer; opacity: 0.8;
        }
        nav a:hover { opacity: 1; border-bottom: 1px solid #fff; }

        .bio { max-width: 550px; margin: 0 auto; font-size: 15px; line-height: 1.6; color: #aaa; margin-bottom: 40px; padding: 0 20px; }

        /* Container für Kontakt und Map */
        #contact-section, #map-section { display: none; padding: 40px 20px; max-width: 1000px; margin: 0 auto; }

        /* UNIFORMES RASTER (GRID) FÜR DIE GALERIE */
        .masonry-container { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; 
            padding: 20px 3%; 
            max-width: 1600px; 
            margin: 0 auto; 
        }

        .masonry-item { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            cursor: pointer; 
            border-radius: 4px; 
            overflow: hidden; 
            background: #222; 
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .masonry-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            transition: transform 0.4s ease;
            background-color: #333; 

            /* KOPIERSCHUTZ GALERIE */
            pointer-events: none; 
            -webkit-touch-callout: none; 
        }
        .masonry-item:hover img { transform: scale(1.05); }

        /* MAP STYLING */
        .map-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .map-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* LIGHTBOX */
        #lightbox {
            position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease-in-out; cursor: zoom-out; touch-action: none;
        }
        #lightbox.active { opacity: 1; visibility: visible; }
        #lightbox img { 
            max-width: 90%; max-height: 90%; 
            transform: scale(1) translate(0px, 0px); 
            transition: transform 0.3s ease, opacity 0.2s ease; 
            user-select: none; 
            -webkit-user-drag: none; 
            transform-origin: center center;
            cursor: zoom-out; 

            /* KOPIERSCHUTZ LIGHTBOX */
            pointer-events: none; 
            -webkit-touch-callout: none;
        }
        #lightbox.active img { transform: scale(1); }
        #lightbox img.no-transition { transition: opacity 0.2s ease; }

        /* Buttons & Socials */
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 30px; }
        .social-btn {
            text-decoration: none; color: #fff; display: inline-flex; align-items: center; gap: 10px; 
            border: 1px solid #444; padding: 12px 25px; border-radius: 50px; font-weight: bold; 
            transition: all 0.3s ease; width: 220px; justify-content: center; background: rgba(255,255,255,0.05);
            pointer-events: auto; 
        }
        .social-btn:hover { background-color: #fff; color: #000; }

        @media (max-width: 950px) { 
            .masonry-container { grid-template-columns: repeat(2, 1fr); padding: 20px 4%; } 
        }
        @media (max-width: 600px) { 
            .masonry-container { grid-template-columns: 1fr; padding: 10px 5%; } 
            header { padding: 40px 10px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lightbox">
    <img id="lightbox-img" src="" alt="Zoom" draggable="false">
</div>

<header>
    <img src="profil.jpg" alt="Profil" class="profile-pic" draggable="false">
    
    <nav>
        <a id="nav-overview" onclick="showSection('gallery-section')">Overview</a>
        <a id="nav-map" onclick="showSection('map-section')">Travel-Log</a>
        <a id="nav-contact" onclick="showSection('contact-section')">Contact</a>
    </nav>

    <div id="gallery-section">
        <p id="bio-text" class="bio">Hi, ich bin David, ein Hobbyfotograf mit Leidenschaft für Natur, Tiere und Reiseabenteuer.</p>
        <div class="masonry-container" id="gallery"></div>
    </div>

    <div id="map-section">
        <h1 id="map-title" style="margin-bottom: 40px; letter-spacing: 2px;">Travel-Log</h1>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/d/embed?mid=1rdjZaqDB5Io6uZy92735Rogj-0Ya8hs&ehbc=2E312F" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

    <div id="contact-section">
        <h1 id="contact-title">Kontakt</h1>
        <div class="btn-container">
            <a href="https://www.instagram.com/dpv0112/" target="_blank" class="social-btn">Instagram</a>
            <a href="https://www.linkedin.com/in/david-vorwerk-b04119305" target="_blank" class="social-btn">LinkedIn</a>
        </div>
        <div style="margin-top: 60px; opacity: 0.4; font-size: 12px; letter-spacing: 1px;">
            <p>E-Mail: <strong style="color: #aaa;">dpv01@proton.me</strong></p>
            <p style="text-transform: uppercase; margin-top: 20px;">© 2026 David Vorwerk</p>
            <p id="rights-text" style="font-style: italic; font-size: 10px; margin-top: 5px;">All rights reserved. Images may not be used without permission.</p>
        </div>
    </div>
</header>

<script>
    try {
        const userLang = navigator.language || navigator.userLanguage || "en";
        if (!userLang.startsWith('de')) {
            document.getElementById('nav-overview').innerText = 'Overview';
            document.getElementById('nav-map').innerText = 'Travel-Log';
            document.getElementById('nav-contact').innerText = 'Contact';
            document.getElementById('bio-text').innerText = "Hi, I'm David, a hobby photographer with a passion for nature, animals and travel adventures.";
            document.getElementById('contact-title').innerText = 'Contact';
            document.getElementById('map-title').innerText = 'Travel-Log';
            document.getElementById('rights-text').innerText = 'All rights reserved. Images may not be used without permission.';
        }
    } catch(e) {}

    function showSection(id) {
        document.getElementById('gallery-section').style.display = 'none';
        document.getElementById('contact-section').style.display = 'none';
        document.getElementById('map-section').style.display = 'none';
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    let currentImages = [];
    let currentIndex = 0;
    
    let isZooming = false;
    let isPanning = false;
    let currentScale = 1;
    let startDistance = 0;
    let startScale = 1;
    let panX = 0, panY = 0;
    let lastTouchX = 0, lastTouchY = 0;
    let touchStartX = 0;

    function openLightbox(src) {
        document.body.classList.add('no-scroll'); 
        currentIndex = currentImages.indexOf(src);
        if(currentIndex === -1) currentIndex = 0; 
        lightboxImg.src = currentImages[currentIndex];
        lightbox.classList.add('active');
        resetZoom();
    }

    function closeLightbox() { 
        document.body.classList.remove('no-scroll'); 
        lightbox.classList.remove('active'); 
        resetZoom(); 
    }

    function applyTransform() {
        lightboxImg.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
    }

    function resetZoom() {
        currentScale = 1; panX = 0; panY = 0;
        isZooming = false; isPanning = false;
        lightboxImg.style.transformOrigin = 'center center'; 
        lightboxImg.classList.remove('no-transition');
        applyTransform();
    }

    function updateLightboxImage() {
        lightboxImg.style.opacity = '0'; resetZoom();
        setTimeout(() => { lightboxImg.src = currentImages[currentIndex]; lightboxImg.style.opacity = '1'; }, 150);
    }

    function nextImage() { if(currentImages.length > 1) { currentIndex = (currentIndex + 1) % currentImages.length; updateLightboxImage(); } }
    function prevImage() { if(currentImages.length > 1) { currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; updateLightboxImage(); } }

    /* --- TOUCH LOGIK (FÜR SMARTPHONES) --- */
    lightbox.addEventListener('touchstart', e => { 
        if (e.touches.length === 2) {
            isZooming = true; isPanning = false;
            lightboxImg.classList.add('no-transition');
            startDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            startScale = currentScale;

            if (currentScale <= 1.05) {
                currentScale = 1; panX = 0; panY = 0;
                let imgW = lightboxImg.offsetWidth;
                let imgH = lightboxImg.offsetHeight;
                let imgL = (window.innerWidth - imgW) / 2;
                let imgT = (window.innerHeight - imgH) / 2;
                let midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                let midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                let originX = ((midX - imgL) / imgW) * 100;
                let originY = ((midY - imgT) / imgH) * 100;
                lightboxImg.style.transformOrigin = `${originX}% ${originY}%`;
                applyTransform();
            }
        } else if (e.touches.length === 1) {
            if (currentScale > 1) {
                isPanning = true; lightboxImg.classList.add('no-transition');
                lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
            } else { touchStartX = e.touches[0].screenX; }
        }
    }, {passive: false});

    lightbox.addEventListener('touchmove', function(e) {
        if (isZooming && e.touches.length === 2) {
            e.preventDefault(); 
            let currentDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            currentScale = startScale * (currentDistance / startDistance);
            if (currentScale < 1) currentScale = 1; if (currentScale > 5) currentScale = 5; 
            applyTransform();
        } else if (isPanning && e.touches.length === 1) {
            e.preventDefault();
            let deltaX = e.touches[0].pageX - lastTouchX; let deltaY = e.touches[0].pageY - lastTouchY;
            panX += deltaX; panY += deltaY;
            lastTouchX = e.touches[0].pageX; lastTouchY = e.touches[0].pageY;
            applyTransform();
        }
    }, {passive: false});

    lightbox.addEventListener('touchend', e => { 
        if (e.touches.length === 1 && isZooming) {
            isZooming = false;
            if (currentScale > 1) {
                isPanning = true;
                lastTouchX = e.touches[0].pageX;
                lastTouchY = e.touches[0].pageY;
            }
            return;
        }

        let wasZoomedOrPanned = isZooming || isPanning || currentScale > 1.05;

        if (e.touches.length === 0) {
            resetZoom();
        }

        if (!wasZoomedOrPanned && e.changedTouches.length === 1) {
            let touchEndX = e.changedTouches[0].screenX; 
            if (touchEndX < touchStartX - 40) nextImage();
            else if (touchEndX > touchStartX + 40) prevImage();
        }
    }, {passive: false});

    /* --- PC MAUS LOGIK (Zielsicherer Maus-Zoom) --- */
    let isMouseDown = false;
    let isMouseDragging = false;

    lightbox.addEventListener('wheel', (e) => {
        if (!lightbox.classList.contains('active')) return;
        e.preventDefault(); 

        let zoomSpeed = 0.15;
        let oldScale = currentScale;
        
        if (e.deltaY < 0) currentScale += zoomSpeed; 
        else currentScale -= zoomSpeed;              

        if (currentScale < 1) currentScale = 1;
        if (currentScale > 5) currentScale = 5;

        if (currentScale !== oldScale) {
            let zoomFactor = currentScale / oldScale;
            let mouseX = e.clientX - (window.innerWidth / 2);
            let mouseY = e.clientY - (window.innerHeight / 2);
            
            panX -= (mouseX - panX) * (zoomFactor - 1);
            panY -= (mouseY - panY) * (zoomFactor - 1);
        }

        if (currentScale === 1) {
            panX = 0; panY = 0;
        }

        lightboxImg.classList.add('no-transition');
        applyTransform();
    }, {passive: false});

    lightbox.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        isMouseDragging = false;
        if (currentScale > 1) {
            e.preventDefault();
            lightboxImg.classList.add('no-transition');
            lastTouchX = e.clientX;
            lastTouchY = e.clientY;
        }
    });

    lightbox.addEventListener('mousemove', (e) => {
        if (isMouseDown) {
            isMouseDragging = true;
            if (currentScale > 1) {
                e.preventDefault();
                let deltaX = e.clientX - lastTouchX;
                let deltaY = e.clientY - lastTouchY;
                panX += deltaX;
                panY += deltaY;
                lastTouchX = e.clientX;
                lastTouchY = e.clientY;
                applyTransform();
            }
        }
    });

    lightbox.addEventListener('mouseup', () => { isMouseDown = false; });
    lightbox.addEventListener('mouseleave', () => { isMouseDown = false; });

    lightbox.addEventListener('click', (e) => {
        if (!isMouseDragging) closeLightbox();
        isMouseDragging = false;
    });

    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === "ArrowRight") nextImage();
        if (e.key === "ArrowLeft") prevImage();
        if (e.key === "Escape") closeLightbox();
    });

    // DYNAMISCHE GITHUB-API LADE-LOGIK
    const gallery = document.getElementById('gallery');

    async function fetchAndLoadImages() {
        try {
            const response = await fetch('https://api.github.com/repos/dpv12/portfolio/contents/');
            if (!response.ok) throw new Error('Netzwerk antwortet nicht');
            const data = await response.json();

            let images = data.filter(file => 
                file.name.match(/\.(webp|jpe?g|png)$/i) && 
                file.name.toLowerCase() !== 'profil.jpg' &&
                !file.name.toLowerCase().includes('reisefoto') &&
                !file.name.toLowerCase().includes('bloge')
            );

            images.sort((a, b) => b.name.localeCompare(a.name));
            loadDynamicImage(images, 0);

        } catch (error) {
            console.error("Konnte GitHub API nicht abfragen:", error);
        }
    }

    function loadDynamicImage(imageArray, index) {
        if (index >= imageArray.length) return; 

        let fileData = imageArray[index];
        let div = document.createElement('div');
        div.className = 'masonry-item';
        
        let imgElement = document.createElement('img');
        imgElement.loading = "lazy";
        let tempImg = new Image();
        
        tempImg.onload = function() {
            imgElement.src = tempImg.src;
            currentImages.push(imgElement.src);
            div.appendChild(imgElement);
            
            div.onclick = (e) => { e.stopPropagation(); openLightbox(imgElement.src); };
            
            gallery.appendChild(div);
            loadDynamicImage(imageArray, index + 1);
        };
        
        tempImg.onerror = function() {
            loadDynamicImage(imageArray, index + 1);
        };

        tempImg.src = fileData.name;
    }

    fetchAndLoadImages();
</script>

</body>
</html>
